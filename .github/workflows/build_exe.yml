name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create placeholder .env
        shell: pwsh
        run: |
          Set-Content -Path ".env" -Value "DHAN_CLIENT_ID=`nDHAN_PIN=`nDHAN_TOTP_SECRET=`nDHAN_ACCESS_TOKEN=`nDHAN_TOKEN_EXPIRY="
          Write-Host ".env created"

      - name: Write PyInstaller spec
        shell: pwsh
        run: |
          $spec = @"
block_cipher = None
a = Analysis(
    ['gui_app.py'],
    pathex=['.'],
    binaries=[],
    datas=[('.env', '.')],
    hiddenimports=[
        'customtkinter',
        'dhanhq',
        'pyotp',
        'schedule',
        'websocket',
        'websocket._app',
        'websocket._core',
        'pandas',
        'pytz',
        'dotenv',
        'requests',
        'PIL',
        'PIL._tkinter_finder',
        'config',
        'pattern_detector',
        'session_guard',
        'strike_selector',
        'order_manager',
        'trade_tracker',
        'dhan_token_manager',
        'main',
    ],
    hookspath=[],
    runtime_hooks=[],
    excludes=[],
    cipher=block_cipher,
    noarchive=False,
)
pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)
exe = EXE(
    pyz, a.scripts, a.binaries, a.zipfiles, a.datas, [],
    name='MorningStarStrategy',
    debug=False,
    strip=False,
    upx=True,
    console=False,
    runtime_tmpdir=None,
)
"@
          Set-Content -Path "MorningStarStrategy.spec" -Value $spec
          Write-Host "Spec written successfully"
          Get-Content "MorningStarStrategy.spec"

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller MorningStarStrategy.spec --clean
          dir dist\

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MorningStarStrategy-Windows
          path: dist\MorningStarStrategy.exe
          retention-days: 30
