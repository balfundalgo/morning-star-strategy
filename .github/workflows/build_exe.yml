name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create placeholder .env
        shell: pwsh
        run: |
          if (-not (Test-Path ".env")) {
            @"
          DHAN_CLIENT_ID=
          DHAN_PIN=
          DHAN_TOTP_SECRET=
          DHAN_ACCESS_TOKEN=
          DHAN_TOKEN_EXPIRY=
          "@ | Out-File -FilePath ".env" -Encoding utf8
          }

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "MorningStarStrategy" ^
            --add-data ".env;." ^
            --add-data "config.py;." ^
            --add-data "pattern_detector.py;." ^
            --add-data "session_guard.py;." ^
            --add-data "strike_selector.py;." ^
            --add-data "order_manager.py;." ^
            --add-data "trade_tracker.py;." ^
            --add-data "dhan_token_manager.py;." ^
            --add-data "main.py;." ^
            --hidden-import "customtkinter" ^
            --hidden-import "dhanhq" ^
            --hidden-import "pyotp" ^
            --hidden-import "schedule" ^
            --hidden-import "websocket" ^
            --hidden-import "pandas" ^
            --hidden-import "pytz" ^
            --collect-all "customtkinter" ^
            --collect-all "dhanhq" ^
            gui_app.py
        shell: cmd

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MorningStarStrategy-Windows
          path: dist\MorningStarStrategy.exe
          retention-days: 30
